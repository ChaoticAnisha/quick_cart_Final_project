name: quick_cart
description: "QuickCart - A mobile e-commerce app designed for fast, user-friendly shopping with streamlined cart and checkout features."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1
  flutter_riverpod: ^2.5.1

  # Error Handling
  dartz: ^0.10.1
  equatable: ^2.0.5

  # Network
  http: ^1.2.0
  dio: ^5.4.1
  http_parser: ^4.0.0

  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Map
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.2

  # JSON Serialization
  json_annotation: ^4.8.1

  # UI & Media
  cupertino_icons: ^1.0.8
  image_picker: ^1.0.7
  camera: ^0.10.5+9
  cached_network_image: ^3.3.1
  permission_handler: ^11.3.0
  sensors_plus: ^4.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.6
  hive_generator: ^2.0.1
  json_serializable: ^6.7.1
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1

flutter_native_splash:
  color: "#ffffff"
  image: assets/images/image 1 (1).png
  android_12:
    color: "#ffffff"
    image: assets/images/image 1 (1).png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/image 1 (1).png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: bold
      fonts:
        - asset: assets/fonts/Poppins-Bold.ttf
    - family: regular
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf